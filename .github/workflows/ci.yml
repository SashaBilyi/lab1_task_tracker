name: CI Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libmariadb-dev shellcheck

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        pip install yamllint

    - name: Lint YAML files
      run: yamllint docker-compose.yml

    - name: Lint Dockerfile
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile

    - name: Lint Shell scripts
      run: shellcheck deploy.sh

    - name: Lint Python code
      run: flake8 app.py migrate.py test_app.py

    - name: Run Tests and Coverage
      run: |
        pytest --cov=app --cov-report=html --cov-report=term-missing --cov-fail-under=40

    - name: Upload Coverage Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/

  build-and-push:
    needs: analyze-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,format=long,prefix=sha-
          type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
          type=ref,event=tag

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Deploy application to Target Node
      run: |
        tar --exclude=app.tar.gz -czf app.tar.gz .
        scp -o StrictHostKeyChecking=no app.tar.gz sasha@192.168.0.103:~/
        ssh -o StrictHostKeyChecking=no sasha@192.168.0.103 "mkdir -p ~/lab1_task_tracker && tar -xzf ~/app.tar.gz -C ~/lab1_task_tracker && cd ~/lab1_task_tracker && chmod +x deploy_lab3.sh && ./deploy_lab3.sh"

    - name: Verify deployment
      run: |
        HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" http://192.168.0.103)
        if [ "$HTTP_STATUS" -eq 200 ]; then
          exit 0
        else
          exit 1
        fi