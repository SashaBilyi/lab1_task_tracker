events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name _;
        
        location = / {
            proxy_pass http://web:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /tasks {
            proxy_pass http://web:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location / { 
            return 403; 
        }
    }
}