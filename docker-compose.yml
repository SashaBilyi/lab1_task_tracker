
services:
  database:
    image: mariadb:10.11
    container_name: lab1_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: task_tracker
      MARIADB_USER: taskuser
      MARIADB_PASSWORD: taskpass
      TZ: Europe/Kyiv
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - lab_network

  web:
    build: 
      context: .
    container_name: lab1_flask_app
    restart: unless-stopped
    environment:
      TZ: Europe/Kyiv
    depends_on:
      - database
    networks:
      - lab_network

  nginx:
    image: nginx:alpine
    container_name: lab1_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - lab_network

networks:
  lab_network:
    driver: bridge